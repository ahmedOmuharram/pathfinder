repos:
  # Ruff for API: pre-commit installs ruff so hooks work without `uv` on PATH
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        name: ruff check (api)
        args: [--config, apps/api/pyproject.toml, --fix]
        files: ^apps/api/
      - id: ruff-format
        name: ruff format (api)
        args: [--config, apps/api/pyproject.toml]
        files: ^apps/api/
  - repo: local
    hooks:
      - id: mypy-api
        name: mypy (api)
        entry: bash -c "cd apps/api && $HOME/.local/bin/uv run --project . mypy src"
        language: system
        pass_filenames: false
        types: [python]
      - id: prettier-web
        name: prettier (web)
        entry: bash -c "cd apps/web && yarn format"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
      - id: eslint-web
        name: eslint (web)
        entry: bash -c "cd apps/web && yarn lint"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
      - id: typecheck-web
        name: tsc --noEmit (web)
        entry: bash -c "cd apps/web && yarn typecheck"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
      - id: boundaries-web
        name: check boundaries (web)
        entry: bash -c "cd apps/web && yarn check:boundaries"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
      - id: vitest-web
        name: vitest (web)
        entry: bash -c "cd apps/web && yarn vitest run"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
        stages: [pre-push]
      - id: pytest-api
        name: pytest (api)
        entry: bash -c "cd apps/api && $HOME/.local/bin/uv run python -m pytest src/veupath_chatbot/tests/unit/ -v"
        language: system
        pass_filenames: false
        types: [python]
        files: ^apps/api/.*
        stages: [pre-push]
      - id: build-web
        name: next build (web)
        entry: bash -c "cd apps/web && NEXT_PUBLIC_API_URL='http://localhost:8000' yarn build"
        language: system
        pass_filenames: false
        files: ^(apps/web/|packages/shared-ts/).*
        stages: [pre-push]
      - id: openapi-generate-api
        name: openapi spec regenerate (api)
        entry: bash -c "cd apps/api && $HOME/.local/bin/uv run python -m veupath_chatbot.devtools.openapi generate"
        language: system
        pass_filenames: false
        types: [python]
        files: ^apps/api/.*
      - id: shared-ts-openapi
        name: openapi types regenerate (shared-ts)
        entry: bash -c "cd packages/shared-ts && yarn generate:openapi"
        language: system
        pass_filenames: false
        files: ^(packages/shared-ts/|apps/api/).*
