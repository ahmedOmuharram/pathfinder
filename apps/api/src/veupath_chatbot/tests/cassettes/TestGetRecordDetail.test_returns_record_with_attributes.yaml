        (product name, notes, etc.)","fullName":"GeneQuestions.GenesByText","description":"Find
        genes by searching text annotations.  The search compares your term against
        the text in the fields you specify, \n          returning genes that have
        a match. <br><br>\n          Select the Organism(s) you wish to query and
        enter your text term.  Surround your text term with quotation marks to find
        exact phrase matches. For example, searching <b>\"ABC transporter\"</b> will
        match the exact phrase ''ABC transporter'', whereas searching <b>ABC transporter</b>
        will match <b>ABC</b> and/or <b>transporter</b>.  Use an asterisk (*) as a
        wild card character when looking for plural or compound words. For example,
        to find all compound words that start with phospho (ie. phosphodiesterase),
        type phospho<b>*</b> in the search window.<br><br>\n\n          <u><i>Hints</i></u>:  The
        search is similar to Google -- if you enter multiple words, genes that match
        more of those words will have a better score than those that match fewer of
        the words.  If the words are found close together, that also improves the
        score.  Higher scores appear at the top of your result list. <br><br> \n\n          <u><i>Looking
        for a list of genes?</i></u>:  If you need to query for a list of gene and
        you have each gene''s ID, use the <a href=\"/a/app/search/transcript/GeneByLocusTag\">Identify
        Genes based on List of IDs</a> search categorized under Genes, Annotation
        curation and identifiers, List of IDs. <br><br> \n          \n          <u><i>Note
        about non-relevant results</i></u>:  \n          Depending on how you configure
        it, this text search may return \"non-relevant\" genes (false positives).  The
        search mechanically matches the term you supply against the Fields that you
