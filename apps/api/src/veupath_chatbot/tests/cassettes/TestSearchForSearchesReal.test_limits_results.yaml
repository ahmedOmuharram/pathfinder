        Cycle Regulated Gene List, Both<\/a>\n\t\t\t\t\t<br>\n2. <a href=\"/toxo/im.do?s=bc7e7d4c43ae1f5a\">Cell
        Cycle Regulated Gene List, G1 Sub Transcriptome<\/a>\n\t\t\t\t\t<br>\n3. <a
        href=\"/toxo/im.do?s=999efc4e343b8410\">Cell Cycle Regulated Gene List, S-M
        Sub Transcriptome<\/a>\n<br><br>The RH<sup>TK+<\/sup> strain used in this
        analysis expresses a fusion protein of herpes simplex thymidine kinase and
        chloramphenicol acetyltransferase (<a href=\"http://www.ncbi.nlm.nih.gov/pubmed/10496908\">Radke
        and White<\/a>).  Synchronization of RH<sup>TK+<\/sup> parasites with thymidine
        followed published protocols (<a href=\"http://www.ncbi.nlm.nih.gov/pubmed/10496908\">Radke
        and White<\/a>).  In this synchrony model parasites released from thymidine
        immediately progress through S, mitosis and then cytokinesis.  The first G1
        phase is the start of the next cycle.  All time points represent microarray
        hybridization results from duplicate, independent biological replicates.  Parasites
        were seeded at an MOI of 1:1 in HFF cells, and grown for 12 h at 37<sup>o<\/sup>C
        (4-8 parasites per vacuole).  To block RH<sup>TK+<\/sup> growth, overnight
        culture media was replaced with pre-warmed DMEM media containing 1% fetal
        bovine serum and 10 &micro;M thymidine.  The flasks were incubated for 4 h
        at 37<sup>o<\/sup>C and then quickly washed 2x with pre-warmed DMEM (no serum)
        with the second wash immediately replaced with pre-warmed DMEM media containing
        1% serum (three total washes).  RH<sup>TK+<\/sup> parasites from multiple
        T175cm<sup>2<\/sup> flasks (10-20 flasks per RNA sample) were purified from
        host cells for RNA isolation every hour post-thymidine release using standard
        protocols.  R0 time point=thymidine blocked population.  Asynchronous RH<sup>TK+<\/sup>
        samples were harvested from mid-log cultures (8 and 16 parasites/vacuole).  The
        R0-12 time course represents ~1-2/3 divisions with tachyzoite cell cycle phase
        repeats R1,R2=R8,R9, R3=R10, R4=R11, and R5=R12 (<a href=\"http://www.plosone.org/article/info%3Adoi%2F10.1371%2Fjournal.pone.0012354\">Behnke
        et al., 2010<\/a>)\n   <hr><p> <img src=\"/a/images/CellCycle.jpg\"  height=\"350px\"
        width=\"550px\">\n   <p> <b>Figure 1.  Synchronization of tachyzoite populations
        by reversible thymidine-inhibition.<\/b>  The average vacuole size (black
        boxes) and fraction of parasites containing internal daughters (black triangles)
        were determined in RH<sup>TK+<\/sup> parasite cultures growth-inhibited by
        thymidine.  At hour intervals through 12 h post-thymidine release, infected
        monolayers were fixed and stained with anti-IMC1.  Vacuole size and the internal
        daughter fraction were determined in 100 vacuoles selected at random.  The
        synchronous division of these populations is evident by the cyclical rise
        and fall of internal daughter forms that is accompanied by a stepwise increase
        in vacuole size that marks the end of one cycle and the start of the next.   The
        cell cycle progression shown here was estimated from these experiments and
        is validated by previous studies using this synchrony model  (<a href=\"http://www.ncbi.nlm.nih.gov/pubmed/10496908\">Radke
        and White<\/a>, <a href=\"http://www.ncbi.nlm.nih.gov/pubmed/11420103\">Radke
        et al.<\/a>).\n<hr><p><img src=\"/a/images/behnke_fig_2.jpg\">\n<p><b>Figure
        2. DNA content changes of thymidine-synchronized populations.<\/b>  RH<sup>TK+<\/sup>
        parasite cultures were blocked with 10 &micro;M thymidine for 4 h and then
        released.  At one hour intervals post thymidine-release (R0-R12), parasites
        were harvested and pooled for RNA isolation with a small sample removed for
        DNA content analysis prior to cell lysis.    Genomic DNA in ethanol-fixed
        parasites was stained with SYTOX-Green and changes in DNA content determined
        by flow cytometry (FL-1; 10,000 events for each sample).  As described previously
        (<a href=\"http://www.ncbi.nlm.nih.gov/pubmed/10496908\">Radke and White<\/a>),
        thymidine-arrested RH<sup>TK+<\/sup> parasites are blocked at the G1/S phase
        boundary (R0) and immediately enter S phase upon drug-release (R1).  New daughter
        parasites start emerging by 3 h post drug-release (R3), and the population
        enters the S phase of the next cell cycle by 7-8 h post-release.   The cell
        cycle progression is indicated with cell cycle phase repeats R1,R2=R8,R9,
        R3=R10, R4=R11, and R5=R12 (C=cytokinesis, M=mitosis, G1=gap 1 phase, S=DNA
        synthesis).","defaultAttributes":["primary_key","gene_product","distance","time_shift","profilesGraph"],"groups":[{"displayType":"empty","displayName":"","name":"empty","description":"","isVisible":true,"parameters":["ProfileGeneId","ProfileDistanceMethod","ProfileNumToReturn","ProfileMissingPtsPercent","profile_profile_set","ProfileSearchGoal","profile_time_shift"]},{"displayType":"hidden","displayName":"","name":"_hidden","description":"","isVisible":false,"parameters":["ProfileScaleFactor","ProfileMinPoints"]}],"filters":[{"isViewOnly":false,"name":"organismFilter"},{"displayName":"Transcripts","isViewOnly":false,"name":"matched_transcript_filter_array"},{"isViewOnly":false,"name":"genesByPathway"}],"shortDisplayName":"Tg
