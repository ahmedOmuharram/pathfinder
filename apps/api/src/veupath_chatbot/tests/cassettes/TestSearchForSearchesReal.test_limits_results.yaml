        to be \n            returned by the search. The higher this parameter, the
        more likely the SNP is to be high quality as regions difficult to align or
        difficult to sequence will tend to have a lower percentage of calls since
        the coverage and/or quality will be lower in that region.<\/p>\n            \n            <p>\n            <b>Minor
        allele frequency:<\/b> Parameter 2 for calling SNPs across your isolate group.<br>\n            The
