        Within a Group of Isolates","fullName":"SnpQuestions.NgsSnpsByIsolateGroup","description":"This
        search analyzes whole genome sequencing data from a group of isolates to find
        SNPs\n            associated with the group. <br><br>\n            \n            Each
        isolate''s sequencing reads are aligned to the reference genome (Organism)
        and \n            SNPs are recorded for each isolate based on the Read Frequency
        Threshold. Then, \n            scanning SNP locations across the \n            group
        of isolates, SNPs are returned by the search if the Minor Allele Frequency
        and the \n            Percent Isolates with a base call are met. <br>\n            <p>
        \n            <b>Organism:<\/b> Choosing an Organism. <br>\n            The
        Organism parameter defines the species of the parasite isolates and the genome
        in which \n            the SNPs are determined.  Choosing an Organism focuses
        the Isolates parameter to the list of isolates \n            of that organism,
        thus changing the subset of isolates available when \n            forming
        your group. <\/p>\n\n            <p>\n            <b>Isolates:<\/b> Choosing
        the isolate group.<br>\n            Isolate sequences are accompanied by information
        about the sequencing data set - metadata \n            such as the clinical
        phenotype of the host or the location collected. By default, the isolate group
        \n            includes all isolates from the Organism you chose. You have
        the option to limit the \n            group of isolates based on metadata
        characteristics. \n            For example, you can find SNPs for isolates
        collected from a certain geographic location. \n            To do this, click
        a metadata category (Country) on the left and choose your desired \n            metadata
        characteristic (e.g. Peru) on the right. Multiple metadata categories and
        characteristics \n            can be chosen when defining your group. Not
        all isolate data sets have the same \n            metadata. A running total
        of your selections is displayed above the \n            metadata filter.<\/p>\n          \n            \n            <p>\n            <b>Read
        Frequency Threshold:<\/b> Calling SNPs for each isolate in your group.<br>\n            Each
        isolate''s sequencing reads are aligned to a reference genome (Organism) and
        then each nucleotide position with 5 or more aligned reads is examined. A
        base call is made if the aligned reads meet your Read Frequency Threshold.
        For example, Isolate X has 10 aligned reads at nucleotide position 1600. If
        6 reads are G and 4 reads are A, the read frequency is 60% for the G call
        and 40% for A. Running this search with the Read Frequency Threshold set to
        80% will prevent a base call and consequently exclude Isolate X when returning
        SNPs for nucleotide position 1600. Running the search with the Read Frequency
        Threshold set to 60% will bring back a G for this isolate and a 40% threshold
        will return two calls (both G and A) at this position.  The parameter lets
        you control the quality of the sequencing data and the confidence of the SNP
        calls. Read Frequency Threshold is a particularly important parameter when
        dealing with diploid (or aneuploid) organisms since a read frequency of ~50%
        is expected for heterozygous SNPs.\n             <\/p>\n             \n            <img
        src=\"/a/images/ReadFreq.jpg\"  height=\"439px\" width=\"746px\" alt=\"Read
        Frequency Threshold\">\n            \n            <p>\n            <br>\n            <br><b>The
        SNPs returned by this search are found by aligning the isolates (with SNPs
        \n            recorded as described above) and \n            applying 2 parameters
        across the group of isolates: Percent \n            isolates with a base call
        and Minor allele frequency.<\/b>\n            <br>\n            <br>\n            \n            <b>Percent
        isolates with a base call:<\/b> Parameter 1 for calling SNPs across your isolate
        group<br>\n            Sometimes an isolate does not have a base \n            call
        at a certain nucleotide position because the Read Frequency Threshold was
        not met or because there\n            were less than 5 aligned sequencing
        reads for that nucleotide position. In this case, a SNP can be \n            returned
        by the search based on a subset of your isolate group. The ''Percent isolates
        with a base call'' \n            parameter defines the fraction of isolates
        that \n            must have a base call before a SNP is returned for that
        nucleotide position. The default setting \n            for this parameter
