        read more...<\/span><\/b><\/u><\/i><\/summary>\n                    <ul>\n                        <li>Each
        black dot represents expression in a sample. A boxplot is shown, with the
        box representing the median and upper/lower quartiles, and the whiskers representing
        the max/min values (or 1.5 times the interquartile range, in which case values
        beyond the whiskers are considered outliers).<\/li>\n\t\t\t<li>Hover over
        the experiment name to show a table of sample names and values.<\/li>\n\t\t\t<li>Click
        on a boxplot to show labels and values for each sample in an experiment. Click
        again on the boxplot to hide labels and values. A button at the bottom-right
        removes labels and values for all experiments.<\/li>\n                        <li>Use
        the toggle button at the bottom-left to switch from Log Scale to Linear Scale.<\/li>\n                        <li>Log
        Scale values are log2(TPM+1) for these reasons:\n                            <ol>\n                                <li>TPM+1:
        to de-emphasize low noisy TPM values (i.e., &lt;1).<\/li>\n                                <li>log2:
        so that each unit on the x-axis represents a 2-fold difference.<\/li>\n                            <\/ol>\n                        <\/li>\n                        <li>Navigation
        buttons appear at the above-right when hovering over the graph. If the buttons
        do not appear, reload the page.<\/li>\n\t\t\t<li>Zoom in with the navigation
        button or click and drag within the graph. Zoom out with the navigation button
