        account for those proteins that are not adequately captured by the mixture
        of multivariate Gaussians, the model is augmented by a heavy-tailed multivariate
        Student&apos;s t-distribution representing an outlier component. \n<p>\nThe
        data are shown as the joint probability of a protein belonging to the 26 defined
        subcellular niches (sums up to 1). In addition, the probability of a protein
        belonging to the outlier component of the classification model is also shown.
        A protein location can be inferred by examining the joint probability values
        to find the subcellular niche with the highest value and comparing it to the
        outlier probability.\n<p>\nIMPORTANT:\n<ol>\n<li>TAGM-MAP and TAGM-MCMC use
        different methods to compute probabilities, and the reported probabilities
        are not the same.<\/li>\n<li>Always consider the outlier probability to make
        sure a given protein location prediction is reliable.<\/li>\n<li>In the case
