        Phenotyping","fullName":"GeneQuestions.GenesByHighThroughputPhenotyping","description":"Identify
        <i>T. brucei</i>  genes based on comparisons of RNAi target sequencing coverage
        at different life cycle stages.  \nGenes returned by this search have coverage
        (RPKM) values in Comparison Sample(s) that is less than that of the Uninduced
        Control. <br><br>\n\n\n\nIn this experiment an RNAi plasmid library, containing
        randomly sheared genomic fragments was used to create an inducible library
        in bloodstream form <i>T. brucei</i>. \nAfter transfection, the library was
        grown under non-inducing and inducing conditions and genomic DNA was isolated
        from surviving populations. Adapter-ligated sequencing libraries were prepared
        from each genomic DNA sample and used to amplify DNA fragments containing
        RNAi cassette-insert junctions in semi-specific PCR reactions. Size-selected
        DNA was sequenced with cycle paired-end runs on an Illumina GAII. Number of
        reads mapping to protein-coding sequences (CDS) were scored for each experiment.<br><br>\nFour
        different induced samples were examined: bloodstream-form cells grown for
        three days (BFd3) or six days (BFd6), insect/procyclic-form cells (PF), and
        cells induced throughout bloodstream growth and differentiation into procyclic
        forms (DIF).  BFd3, BFd6, PF and DIF cultures were grown under inducing conditions
        (Tetracycline) for the equivalent of approximately 10, 20, 9 and 7+6 population
        doublings, respectively (~7 h for BF doubling, ~24 h for PF doubling).\n<br><br>\nCells
        carrying RNAi target fragments that negatively impact fitness through dsRNA
        expression and RNAi-mediated ablation are relatively depleted as the population
        expands and these changes are reported by the depth of sequence coverage relative
        to the uninduced control (No Tet).<br><br>\nFor further details, please refer
        the following manuscript: <a href=\"http://genome.cshlp.org/content/early/2011/03/17/gr.115089.110\">High-throughput
        phenotyping using parallel sequencing of RNA interference targets in the African
        trypanosome.</a>\n<br><br>\nThe following four searches return the lists of
        genes from this paper that show significant loss of fitness (Z-scores >= 3.3)
        for each of the stages tested in this experiment.\n<br><br>\n<ul>\n<li><a
        href=\"/tritrypdb/im.do?s=b0f067c5bed96e42\">Blood form day 3</a></li>\n<li><a
        href=\"/tritrypdb/im.do?s=85a725b9f604d4d2\">Blood form day 6</a></li>\n<li><a
        href=\"/tritrypdb/im.do?s=c89f311e3b0810e5\">Procyclic form</a></li>\n<li><a
        href=\"/tritrypdb/im.do?s=d0a76450ba83b287\">Differentiation</a></li>\n</ul>\n<br>\nThis
        strategy shows loss of fitness in <a href=\"/tritrypdb/im.do?s=90e8dbf579cdc556\">all
        four of the above samples</a>.\n\n<sup>1</sup> The DIF sample involved RNAi
        induction throughout growth as bloodstream forms, differentiation and growth
        as procyclic \nforms, so that any gene required for growth in either life-cycle
        stage or for differentiation should register a loss-of-fitness in this sample.<br><br><br>\n\n<br><br>\n<b>Note:</b>
        These data were re-analyzed as part of the loading protocol for TriTrypDB.  RPKM
        values were computed for CDS sequences and annotated \ngene models (primarily
        just 5'' UTR + CDS since only 10 genes have annotated 3'' UTRs currently).  Alsford
        et. al. used the CDS for their analyses since the \nannotation of UTRs is
        less reliable.  Differences in the results can be clearly seen when comparing
        these two methods.  For example \nby <a href=\"/tritrypdb/showRecord.do?name=GeneRecordClasses.GeneRecordClass&source_id=Tb927.8.2780&project_id=TriTrypDB\">Tb927.8.2780</a>.  This
        gene was shown \nin Alsford et. al. to cause significant loss of fitness in
        all stages with there being zero reads for BFd3 and BFd6 while the entire
        gene model \nanalysis shows there to be no decrease in reads in any stage.  When
        we examined the coverage in Genome Browser for this region we found that all
        the \nalignments in this gene in blood form stages were to the 5'' UTR and
        in fact, there is a predominant splice leader addition site for blood form
        \nstages between the alignments and the CDS, thus explaining the differences.  \n<br>\nIn
        the analysis carried out by Alsford et al., pseudogenes, genes annotated as
        \"hypothetical unlikely\", and genes belonging to the repetitive VSG, expression
