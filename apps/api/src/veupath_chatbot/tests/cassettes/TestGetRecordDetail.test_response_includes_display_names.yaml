        genes may be returned by queries run on TriTrypDB. \n<br><br>","defaultAttributes":["primary_key","organism","gene_product","fold_change_chosen_display","tbruTREU927_RNAi_Horn_rnaSeq_RSRC_expr_graph"],"groups":[{"displayType":"dynamic","displayName":"Dynamic
