        donovani BPK282A1 Visceral vs cutaneous isolate transcriptomes changes in
        sense and antisense transcripts","fullName":"GeneQuestions.GenesByRNASeqldonBPK282A1_Zhang_Visceral_vs_Cutaneous_Leishmaniasis_ebi_rnaSeq_RSRCSenseAntisense","description":"Find
        genes that exhibit simultaneous changes in sense and antisense transcripts
        in the Comparison sample relative to the Reference Sample. For example, you
        could look for genes showing increasing antisense transcripts and decreasing
        sense transcripts, as might occur when antisense transcription suppresses
        sense transcription. The search will perform all pairwise comparisons between
        the chosen Comparison samples and the chosen Reference samples. Below is an
        example where there is an increase in antisense transcripts and a decrease
        in sense transcripts in the Comparison sample: \n<br/><br/>\n<div align=\"center\">\n     <img
        src=\"/a/images/sense_antisense_1.png\">\n</div>\n<br/><br/>\nAn example of
        the TPM data for a gene is shown below. You can select the direction and the
        magnitude of change for the sense and antisense transcripts.\n<br/><br/>\n<div
        align=\"center\">\n      <img src=\"/a/images/sense_antisense_2.png\">\n</div>\n<br/><br/>\nThe
        results page lists the genes, along with each pair of samples (Reference-&gt;Comparison),
        that meet the criteria. The results page also shows a graph depicting all
        pairwise fold-changes in antisense and sense transcripts that is useful in
        identifying which samples meet the criteria that you selected AND whether
        this pattern is observed across all samples. \n<br/><br/>\n<div align=\"center\">\n      <img
        src=\"/a/images/sense_antisense_3.png\">\n</div>\n<br/><br/>\nEach point shows
        the sense fold-change and the antisense fold-change between a pair of samples.
        A point on the red dotted diagonal line represents a pair of samples where
        the antisense fold-change and the sense fold-change are the same. Sample pairs
        that meet the fold-change critera are represented by points located within
        the corner of the graph that is closed off with a vertical and a horizontal
