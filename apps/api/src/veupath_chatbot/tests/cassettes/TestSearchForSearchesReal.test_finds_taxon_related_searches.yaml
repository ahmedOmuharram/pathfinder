        recorded if they meet the major allele frequency and \n            percent
        isolates with a base call. \n            SNPs returned by the search are ones
        that differ between Isolate Set A and B. <\/p>\n            \n            <p>
        \n            <b>Organism:<\/b> Choosing an Organism. <br>\n            The
        Organism parameter defines the species of the parasite isolates and the genome
        in which \n            the SNPs are determined.  Choosing an Organism focuses
        the Isolates parameter to the list of isolates \n            of that organism,
        thus changing the subset of isolates available when \n            forming
        your group. <\/p>\n\n            <p>\n            <b>Isolates:<\/b> Choosing
        isolate Set A and B.<br>\n            Isolate sequences are accompanied by
        information about the sequencing data set - metadata \n            such as
        the clinical phenotype of the host or the location collected. By default,
        the isolate group \n            includes all isolates from the Organism you
        chose. You have the option to limit the \n            group of isolates based
        on metadata characteristics. \n            For example, you can find SNPs
        for isolates collected from a certain geographic location. \n            To
        do this, click a metadata category (Country) on the left and choose your desired
        \n            metadata characteristic (e.g. Peru) on the right. Multiple metadata
        categories and characteristics \n            can be chosen when defining your
        group. Not all isolate data sets have the same \n            metadata. A running
        total of your selections is displayed above the \n            metadata filter.<\/p>\n          \n            \n            <p>\n            <b>Read
        Frequency Threshold:<\/b> Calling SNPs for each isolate in a set.<br>\n            Each
        isolate''s sequencing reads are aligned to a reference genome (Organism) and
        then each nucleotide position with 5 or more aligned reads is examined. A
        base call is made if the aligned reads meet your Read Frequency Threshold.
        For example, Isolate X has 10 aligned reads at nucleotide position 1600. If
        6 reads are G and 4 reads are A, the read frequency is 60% for the G call
        and 40% for A. Running this search with the Read Frequency Threshold set to
        80% will prevent a base call and consequently exclude Isolate X when returning
        SNPs for nucleotide position 1600. Running the search with the Read Frequency
        Threshold set to 60% will bring back a G for this isolate and a 40% threshold
        will return two calls (both G and A) at this position.  The parameter lets
        you control the quality of the sequencing data and the confidence of the SNP
        calls. Read Frequency Threshold is a particularly important parameter when
        dealing with diploid (or aneuploid) organisms since a read frequency of ~50%
        is expected for heterozygous SNPs.\n             <\/p>\n             \n            <img
        src=\"/a/images/ReadFreq.jpg\"  height=\"439px\" width=\"746px\" alt=\"Read
        Frequency Threshold\">\n            \n            <p>\n            <br>\n            <br><b>The
        SNPs returned by this search are found by comparing SNPs from Set A Isolates
        \n            with those from Set B. SNPs are recorded for each set by aligning
        the isolates in each set (with \n            isolate specific SNPs recorded
        as described above for read frequency threshold) and \n            applying
        2 parameters across the isolate sets: Percent \n            isolates with
        a base call and Major allele frequency. SNPs returned by the search have different
        \n            base call between group A isolates and group B isolates. <\/b><\/p>\n            \n\n            <p>\n            <b>Percent
        isolates with a base call:<\/b> Parameter 1 for recording SNPs in isolate
        sets <br>\n            Sometimes an isolate does not have a base \n            call
        at a certain nucleotide position because the Read Frequency Threshold was
        not met or because there\n            were less than 5 aligned sequencing
        reads for that nucleotide position. In this case, a SNP can be \n            returned
        by the search based on a subset of your isolate group. The ''Percent isolates
        with a base call'' \n            parameter defines the fraction of isolates
        that \n            must have a base call before a SNP is recorded for that
        nucleotide position. The default setting \n            for this parameter
        is 80% or 8 out of 10 isolates in your set must have a base call for a SNP
        to be \n            recorded for the set of isolates. <\/p>\n            \n            <p>\n            <b>Major
        Allele Frequency:<\/b> Parameter 2 for recording SNPs in isolate sets<br>\n            The
