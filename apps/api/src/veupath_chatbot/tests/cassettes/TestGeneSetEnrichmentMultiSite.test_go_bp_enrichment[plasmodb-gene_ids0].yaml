      string: '{"searchData":{"paramNames":["organism","goAssociationsOntologies","goEvidenceCodes","goSubset","pValueCutoff"],"isCacheable":false,"displayName":"Gene
        Ontology Enrichment","releaseVersion":"22","name":"go-enrichment","description":"<p>The
        Gene Ontology (GO) is a public resource that develops organism \n            independent
        ontologies (structured controlled vocabularies) that describe \n            a
        gene&rsquo;s molecular function, cellular component or biological processes.
        \n            GO Terms are associated with genes as a form of annotation.
        \n            This tool looks for enriched GO terms &#8212; GO terms that
        appear in the genes of \n            your search result (subset) more frequently
        than they do in the set of all genes \n            for that organism (background).\n           </p>\n           <p>For
        statistical reasons, this analysis can only be performed on a set of genes
        \n             from a single organism. If your gene result contains genes
        from several organisms, \n             use the Filter Table to limit your
        gene result. Then choose an Ontology, a GO Association \n             Source,
        and a P-Value Cutoff and click Submit.\n           </p>\n           <p> By
        selecting GOSlim_generic_only for the GO subset parameter the background dataset\n             and
        the gene list will be limited to GO terms from the GO Slim generic subset.
