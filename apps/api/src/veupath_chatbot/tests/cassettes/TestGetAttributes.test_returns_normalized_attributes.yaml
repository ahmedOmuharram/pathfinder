        Phylogenetic Profile\",\"fullName\":\"GeneQuestions.GenesByOrthologPattern\",\"description\":\"Find
        genes that have a specified orthology-based phylogenetic profile. The phylogenetic
        profile of a gene is a series of \\\"present\\\" or \\\"absent\\\" \\n            calls,
        reflecting the inclusion of a gene in ortholog groups determined by the <a
        href=\\\"https://orthomcl.org/\\\">OrthoMCL</a> algorithm. \\n           <br><br>\\n
        \          \\n           The OrthoMCL algorithm clusters proteins into ortholog
        groups based on BLAST similarity across at least 150 genomes that span the
        tree of life. \\n           The ortholog groups document protein similarity
        across many species. Mapping ortholog groups onto the phyletic tree of life
        provides a framework \\n           for correlating protein similarity across
        species. The other species that are included in that gene's ortholog group
        can be thought of as a phylogenetic profile.\\n            <br><br>\\n            Use
        this search to define a pattern\\n            across those ortholog groups,
        and find genes that match that pattern.  The pattern is a\\n            specification,
        for each species, of \\\"include\\\", \\\"exclude\\\", or \\\"no constraints.\\\"
        \ Click on the\\n            radio button next to a species to toggle through
        the three states.  A\\n            <img src=\\\"/a/images/yes.gif\\\"> means\\n
        \           \\\"include\\\", an <img src=\\\"/a/images/no.gif\\\"> means \\\"exclude\\\"\\n
        \           and <img src=\\\"/a/images/dc.gif\\\"> means \\\"no constraints\\\".\\n
        \           <br> <br>\\n            For example, to find genes\\n            that
