        Intron Junctions\",\"fullName\":\"GeneQuestions.GenesByIntronJunctions\",\"description\":\"This
        search identifies genes that contain, or are flanked by, unannotated introns
        \u2013 defined as RNAseq reads that map to discontinuous regions on the same
        DNA strand as a gene, span canonical splice donor & acceptor motifs, and are
        not reflected in the reference annotation for that gene.  These introns may
        suggest incorrect gene model annotation or alternatively-spliced transcripts,
        and should be carefully reviewed in the genome browser, in the context of
        additional evidence (abundance in various samples, frequency of splicing relative
        to flanking exon sequences, etc).  Changes to the gene model can then be made
