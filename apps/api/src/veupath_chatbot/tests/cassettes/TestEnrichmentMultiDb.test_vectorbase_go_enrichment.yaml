        others have some degree of curation","dependentParams":[],"displayType":"checkBox","isReadOnly":false,"vocabulary":[["Computed","Computed",null],["Curated","Curated",null]],"allowEmptyValue":false,"name":"goEvidenceCodes","initialDisplayValue":"[\"Computed\",\"Curated\"]","properties":{"organisms":["FILL"],"specificAttribution":[]},"group":"empty"},{"displayName":"Limit
