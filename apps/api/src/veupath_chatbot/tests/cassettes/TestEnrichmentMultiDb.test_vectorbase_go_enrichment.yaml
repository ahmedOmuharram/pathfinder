        Process","properties":{"organisms":["FILL"],"specificAttribution":[]},"group":"empty"},{"displayName":"Evidence","minSelectedCount":1,"maxSelectedCount":-1,"isVisible":true,"type":"multi-pick-vocabulary","help":"A
