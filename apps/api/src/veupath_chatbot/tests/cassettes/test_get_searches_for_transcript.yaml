        Number Comparison (CNV)\",\"fullName\":\"GeneQuestions.GenesByCopyNumberComparison\",\"description\":\"Find
        genes by comparing the gene copy number in one or more resequenced strains
        to its copy \\n                number in the reference genome.<br><br>\\n
        \               \\n                Whole genome resequencing was used to estimate
        each gene's copy number in resequenced strains. This \\n                search
        compares the estimated copy number of a gene in the resequenced strain with
        the copy number in the reference annotation.\\n                The copy number
        in the reference annotation is calculated as the number of genes that are
        both on the same chromosome and in the same ortholog group as the gene of
        interest. We infer that these genes have arisen as a result of tandem duplication
        of a common ancestor.\\n\\n                <br><br>\\n                \\n
        \               In this search, the metric for copy number is the haploid
        number, which is the number of copies of a gene on a \\n                single
        chromosome. <br><br>\\n                \\n                 \\n                Begin
        by choosing an Organism (reference genome), and one or more resequenced strains,
        then choose how you want to compare the resequenced strains to the reference.
        \\n                You can search for genes where the estimated copy number
        in the \\n                resequenced strains is greater than or equal to,
        equal to, or less than or equal to the number of copies in the \\n                reference
