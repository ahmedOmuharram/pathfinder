        Protein Interaction\",\"fullName\":\"GeneQuestions.GenesByPlasmoProteinProteinInteraction\",\"description\":\"Find
        interacting partners of a specific gene as determined by yeast two-hybrid
        experiments.  \\nThis data is available for <i> P. falciparum</i> only.  <br><br>\\n\\n<u>Gene
        ID</u><br>\\nEnter the ID of the gene for which you want to find interaction
        partners. Genes returned by this search have protein products that \\nwere
        identified as interacting with the protein product of the Gene ID you enter
        here. <br><br> \\n\\n<u>Number of searches that found this interaction</u><br>\\nIndicate
        the number of independent yeast two-hybrid screens in which a given interaction
        was found before a gene \\n(the interacting partner) is returned by the search.
        This parameter can also be considered \\\"Times Reproduced\\\". \\nInteractions
        found in more than one yeast two-hybrid screen are more likely \\nto be true
        positives because the data were independently produced. \\n\\n<br><br>\\n<u>Number
        of times this interaction was found</u>\\nIndicate the total number of times
        a given interaction was identified in all yeast two-hybrid screens before
        a gene \\n(the interacting partner) is returned by the search. This parameter
        can also be considered \\\"Times Observed\\\".\\n<br><br>\\n \\nAn  interaction
        can be identified multiple times in the same screen for several reasons (see
        1-3 below) but only (3) \\nprovides independent confirmation of a putative
        interaction. <br>\\n(1) The original yeast cell containing \\nthe pair of
        interacting proteins divided before being plated on selective media;<br>\\n(2)
        The same prey plasmid was present in the \\nlibrary multiple times giving
        rise to multiple positive colonies;<br>\\n(3) The prey  gene was present in
        the library as \\nmultiple independent, overlapping  fragments, all of which
        interact with a given bait.  \\n\\n<br><br>\\n<u>Specified protein is bait
