        WGCNA modules (functional prediction)\",\"fullName\":\"GeneQuestions.GenesByRNASeqpfal3D7_Lee_Gambian_ebi_rnaSeq_RSRCWGCNAModules\",\"description\":\"<u>Run
        this search</u>: This search returns genes that belong to a specific WGCNA
        module. Choose your module of interest from the dropdown menu for the WGCNA
        Module parameter. (See the study explorer section below for tools on identifying
        a module that may be of interest to you.) Then choose the correlation coefficient
        that a gene's expression profile must share with the eigengene for the gene
        to be considered a member of the module. Click Get Answer to retrieve genes
        that meet your criteria. <br><br>\\n        \\n        <u>WGCNA module</u>:
        Weighted gene co-expression network analysis (WGCNA) identifies groups of
        genes that have similar expression across samples. The analysis considers
        the whole transcriptome data set and clusters co-expressed genes into groups
        called modules. The modules in VEuPathDB were found using an <a href=\\\"https://www.biorxiv.org/content/10.1101/234062v1.full.pdf\\\">iterative
        Weighted Gene Correlation Network Analysis</a>.  <br><br>\\n\\n        <u>Eigengene</u>:
        The eigengene is created in the WGCNA analysis and is an imaginary gene whose
        expression profile represents an average gene within the module. Each module
        is represented by an eigengene. It is very likely that no gene within the
        module has the same expression profile as the eigengene. <br><br>\\n\\n        <u><a
        href=\\\"https://qa.plasmodb.org/plasmo.b68/app/workspace/analyses/DS_82dc5abc7f/new\\\"
        target=\\\"_blank\\\">Study Explorer</a></u>: Relationships between modules
        or between modules and study variables such as participant disease status
        (asymptomatic vs severe), blood parasitemia, or age, may reveal central players
        in biological processes associated with the whole transcriptome data set.
        Use the <a href=\\\"https://qa.plasmodb.org/plasmo.b68/app/workspace/analyses/DS_82dc5abc7f/new\\\"
