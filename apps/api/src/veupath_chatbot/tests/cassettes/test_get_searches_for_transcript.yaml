        Motif Pattern\",\"fullName\":\"GeneQuestions.GenesByMotifSearch\",\"description\":\"Find
        genes whose protein product contains a motif pattern that\\n             you
        specify. <br>\\n             First choose the Organism that you wish to query.
        Then define the motif to query \\n             by entering a Perl-style regular
        expression that defines the motif you want to find. \\n             Regular
        expressions are more powerful than PROSITE patterns. <br><br>\\n             \\n
        \            \\n             For example, \\\"CC6+RK\\\" is a Perl style regular
        expression representing \\\"two cysteines followed\\n             by one or
        more hydrophobic amino acids, followed by arginine and\\n             then
        lysine\\\". This type of search pattern allows you to find sequences that
        may be less well conserved.  \\n             <br><br>\\n\\n             Another
        example is the pattern of the\\n             <a href=\\\"http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?cmd=Retrieve&db=pubmed&dopt=Abstract&list_uids=15591202&query_hl=2\\\">\\n
        \            Pexel motif</a>, which can be represented as \\\"RXLX[EQD]\\\",
        meaning\\n             \\\"an arginine, then any amino acid, then a leucine,
        then any amino\\n             acid, then either an aspartic acid, a glutamic
        acid, or a\\n             glutamine\\\". Note that the period (.) is used
        to search for any character, even a non-amino acid character like J or asterisk
        (*). Thus, the search pattern \\\"S.T\\\" could find \\\"SWT\\\" or \\\"S*T\\\"
        or \\\"S-T\\\".\\n             <br><br>\\n\\n             For a description
        of how to create regular expressions,\\n             please see the <a href=\\\"/a/app/static-content/regexp.html\\\">Regular
        Expression Tutorial</a>.\\n             <br><br>\\n\\n             The following
