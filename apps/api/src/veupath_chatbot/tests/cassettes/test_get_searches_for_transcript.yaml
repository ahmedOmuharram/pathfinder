        \         For help with obtaining EC numbers, try the <a href=\\\"http://ca.expasy.org/enzyme/\\\">ExPASy-ENZYME</a>
        browser.\\n          <br><br>\\n          \\n          First select the Organism(s)
        you wish to query. The search will return genes from these organisms. \\n
        \         \\n          Then choose the Source of Assignment.  integrated EC
        numbers from several sources.  EC assignments \\n          from more than
        one source may be queried in a single search. Genes \\n          returned
        by the search will have EC assignements from the Source that you select here.<br><br>\\n
        \         \\n          Next indicate the EC Number or Term you wish to query.
        Begin typing an EC number or name to \\n            see a list of all possible
        EC categories that match what you have typed. Then choose an EC category from
        \\n            the list. <br><br>\\n            Alternatively, you can type
