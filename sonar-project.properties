# SonarQube local analysis configuration
# Docs: https://docs.sonarsource.com/sonarqube-community-build/analyzing-source-code/analysis-parameters/

sonar.host.url=http://localhost:9000
sonar.projectKey=pathfinder
sonar.projectName=PathFinder

# ── Source layout ──────────────────────────────────────────────
sonar.sources=apps/api/src,apps/web/src,packages/shared-ts/src

# Test file identification (co-located and dedicated directories)
sonar.test.inclusions=**/tests/**/*.py,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── Exclusions ─────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/__pycache__/**,\
  **/coverage/**,\
  **/*.config.*,\
  **/e2e/**,\
  **/docs/**,\
  **/thesis/**,\
  **/scripts/**

# ── Python ─────────────────────────────────────────────────────
sonar.python.version=3.14
sonar.python.coverage.reportPaths=apps/api/coverage.xml

# ── TypeScript ─────────────────────────────────────────────────
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info

# ── General ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
