openapi: 3.1.0
info:
  title: Pathfinder API
  description: VEuPathDB Strategy Builder Chatbot API
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health Check
      description: Liveness check - is the service running?
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/config:
    get:
      tags:
      - health
      summary: System Config
      description: 'Report whether the system has LLM provider keys configured.


        This is unauthenticated so the frontend can show a setup-required

        screen before asking users to log in.'
      operationId: system_config_health_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfigResponse'
  /health/ready:
    get:
      tags:
      - health
      summary: Readiness Check
      description: 'Readiness check - is the service ready to accept requests?


        Checks database connectivity and Qdrant availability (if RAG is enabled).

        Returns 503 if any dependency is unreachable.'
      operationId: readiness_check_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/sites:
    get:
      tags:
      - sites
      summary: List Sites
      description: List all available VEuPathDB sites.
      operationId: list_sites_api_v1_sites_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SiteResponse'
                type: array
                title: Response List Sites Api V1 Sites Get
  /api/v1/sites/{siteId}/record-types:
    get:
      tags:
      - sites
      summary: Get Record Types
      description: Get record types available on a site.
      operationId: get_record_types_api_v1_sites__siteId__record_types_get
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordTypeResponse'
                title: Response Get Record Types Api V1 Sites  Siteid  Record Types Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/searches:
    get:
      tags:
      - sites
      summary: Get Searches
      description: Get searches available on a site, optionally filtered by record type.
      operationId: get_searches_api_v1_sites__siteId__searches_get
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      - name: recordType
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Recordtype
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResponse'
                title: Response Get Searches Api V1 Sites  Siteid  Searches Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/searches/{recordType}/{searchName}/validate:
    post:
      tags:
      - sites
      summary: Validate Search Params
      description: Validate search parameters (UI-friendly).
      operationId: validate_search_params_api_v1_sites__siteId__searches__recordType___searchName__validate_post
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      - name: recordType
        in: path
        required: true
        schema:
          type: string
          title: Recordtype
      - name: searchName
        in: path
        required: true
        schema:
          type: string
          title: Searchname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchValidationRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchValidationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/searches/{recordType}/{searchName}/param-specs:
    post:
      tags:
      - sites
      summary: Get Param Specs With Context
      description: Return normalized parameter specs, using contextual WDK vocab when provided.
      operationId: get_param_specs_with_context_api_v1_sites__siteId__searches__recordType___searchName__param_specs_post
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      - name: recordType
        in: path
        required: true
        schema:
          type: string
          title: Recordtype
      - name: searchName
        in: path
        required: true
        schema:
          type: string
          title: Searchname
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParamSpecsRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParamSpecResponse'
                title: Response Get Param Specs With Context Api V1 Sites  Siteid  Searches  Recordtype   Searchname  Param
                  Specs Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/organisms:
    get:
      tags:
      - sites
      summary: List Organisms
      description: Return all available organism names for a site via site-search.
      operationId: list_organisms_api_v1_sites__siteId__organisms_get
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganismsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/genes/search:
    get:
      tags:
      - sites
      summary: Search Genes
      description: Search genes by text using multi-strategy gene lookup.
      operationId: search_genes_api_v1_sites__siteId__genes_search_get
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      - name: q
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Q
      - name: organism
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Organism
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneSearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sites/{siteId}/genes/resolve:
    post:
      tags:
      - sites
      summary: Resolve Genes
      description: Resolve gene IDs to full records via WDK standard reporter.
      operationId: resolve_genes_api_v1_sites__siteId__genes_resolve_post
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          title: Siteid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneResolveRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneResolveResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/models:
    get:
      tags:
      - models
      summary: List Models
      description: 'Return available models grouped by provider.


        Models whose provider has no API key are returned with ``enabled: false``

        so the frontend can render them as disabled in the picker.'
      operationId: list_models_api_v1_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
  /api/v1/tools:
    get:
      tags:
      - tools
      summary: List Tools
      description: Return the list of AI tools registered on the agent.
      operationId: list_tools_api_v1_tools_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
  /api/v1/chat:
    post:
      tags:
      - chat
      summary: Chat
      description: 'Start a chat operation and return its operation ID.


        The client subscribes to GET /operations/{operationId}/subscribe for SSE events.'
      operationId: chat_api_v1_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/strategies:
    get:
      tags:
      - strategies
      summary: List Strategies
      description: List user's conversation streams (projections).
      operationId: list_strategies_api_v1_strategies_get
      security:
      - APIKeyCookie: []
      parameters:
      - name: siteId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyResponse'
                title: Response List Strategies Api V1 Strategies Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - strategies
      summary: Create Strategy
      description: Create a new strategy (CQRS only).
      operationId: create_strategy_api_v1_strategies_post
      security:
      - APIKeyCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStrategyRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/dismissed:
    get:
      tags:
      - strategies
      summary: List Dismissed Strategies
      description: List user's dismissed (soft-deleted) strategies.
      operationId: list_dismissed_strategies_api_v1_strategies_dismissed_get
      security:
      - APIKeyCookie: []
      parameters:
      - name: siteId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyResponse'
                title: Response List Dismissed Strategies Api V1 Strategies Dismissed Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/{strategyId}:
    get:
      tags:
      - strategies
      summary: Get Strategy
      description: Get a strategy/stream by ID from the CQRS projection + Redis.
      operationId: get_strategy_api_v1_strategies__strategyId__get
      security:
      - APIKeyCookie: []
      parameters:
      - name: strategyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Strategyid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - strategies
      summary: Update Strategy
      description: Update a strategy (CQRS only).
      operationId: update_strategy_api_v1_strategies__strategyId__patch
      security:
      - APIKeyCookie: []
      parameters:
      - name: strategyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Strategyid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStrategyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - strategies
      summary: Delete Strategy
      description: 'Delete a strategy: cancel ops, clean Redis stream, delete CQRS records.


        For WDK-linked strategies with ``deleteFromWdk=false`` (default), the

        strategy is soft-deleted (dismissed) instead of hard-deleted. This prevents

        WDK sync from re-importing it. Use the restore endpoint to un-dismiss.


        Pass ``deleteFromWdk=true`` to hard-delete from both PathFinder and WDK.

        Non-WDK strategies are always hard-deleted.'
      operationId: delete_strategy_api_v1_strategies__strategyId__delete
      security:
      - APIKeyCookie: []
      parameters:
      - name: strategyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Strategyid
      - name: deleteFromWdk
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Deletefromwdk
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/{strategyId}/ast:
    get:
      tags:
      - strategies
      summary: Get Strategy Ast
      description: Return the raw plan AST from a strategy's projection.
      operationId: get_strategy_ast_api_v1_strategies__strategyId__ast_get
      security:
      - APIKeyCookie: []
      parameters:
      - name: strategyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Strategyid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONObject'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/{strategyId}/restore:
    post:
      tags:
      - strategies
      summary: Restore Strategy
      description: 'Restore a dismissed (soft-deleted) strategy.


        Clears dismissed_at, resets plan to empty (triggers lazy WDK re-fetch),

        and wipes message history. The strategy reappears as if freshly imported.'
      operationId: restore_strategy_api_v1_strategies__strategyId__restore_post
      security:
      - APIKeyCookie: []
      parameters:
      - name: strategyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Strategyid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/step-counts:
    post:
      tags:
      - strategies
      summary: Compute Step Counts
      description: Compute step counts by executing the plan in WDK.
      operationId: compute_step_counts_api_v1_strategies_step_counts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepCountsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepCountsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/strategies/plan/normalize:
    post:
      tags:
      - strategies
      summary: Normalize Plan
      description: 'Normalize/coerce plan parameters using backend-owned rules.


        This endpoint exists so the frontend can be a consumer of backend canonicalization

        (and avoid re-implementing CSV/JSON parsing and WDK quirks).'
      operationId: normalize_plan_api_v1_strategies_plan_normalize_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanNormalizeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanNormalizeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/strategies/open:
    post:
      tags:
      - strategies
      summary: Open Strategy
      description: Open a strategy by local or WDK strategy.
      operationId: open_strategy_api_v1_strategies_open_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenStrategyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenStrategyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/strategies/sync-wdk:
    post:
      tags:
      - strategies
      summary: Sync All Wdk Strategies
      description: Batch-sync all WDK strategies into the CQRS layer and return the full list.
      operationId: sync_all_wdk_strategies_api_v1_strategies_sync_wdk_post
      security:
      - APIKeyCookie: []
      parameters:
      - name: siteId
        in: query
        required: true
        schema:
          type: string
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyResponse'
                title: Response Sync All Wdk Strategies Api V1 Strategies Sync Wdk Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/experiments/:
    post:
      tags:
      - experiments
      summary: Create Experiment
      description: Create and run an experiment as a background task.
      operationId: create_experiment_api_v1_experiments__post
      security:
      - APIKeyCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperimentRequest'
      responses:
        '202':
          description: Experiment launched as background task
          content:
            application/json:
              schema:
                type: object
                properties:
                  operationId:
                    type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - experiments
      summary: List Experiments
      description: List experiments owned by the current user, optionally filtered by site.
      operationId: list_experiments_api_v1_experiments__get
      security:
      - APIKeyCookie: []
      parameters:
      - name: siteId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Siteid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JSONObject'
                title: Response List Experiments Api V1 Experiments  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/experiments/batch:
    post:
      tags:
      - experiments
      summary: Create Batch Experiment
      description: Run the same search across multiple organisms as a background task.
      operationId: create_batch_experiment_api_v1_experiments_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBatchExperimentRequest'
        required: true
      responses:
        '202':
          description: Batch experiment launched as background task
          content:
            application/json:
              schema:
                properties:
                  operationId:
                    type: string
                type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/experiments/benchmark:
    post:
      tags:
      - experiments
      summary: Create Benchmark
      description: Run the same strategy against multiple control sets as a background task.
      operationId: create_benchmark_api_v1_experiments_benchmark_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBenchmarkRequest'
        required: true
      responses:
        '202':
          description: Benchmark suite launched as background task
          content:
            application/json:
              schema:
                properties:
                  operationId:
                    type: string
                type: object
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/experiments/seed:
    post:
      tags:
      - experiments
      summary: Seed Strategies
      description: 'Seed demo strategies and control sets across VEuPathDB sites.


        If *site_id* is provided, only seeds for that database are created.'
      operationId: seed_strategies_api_v1_experiments_seed_post
      security:
      - APIKeyCookie: []
      parameters:
      - name: site_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Site Id
      responses:
        '200':
          description: SSE stream of seed strategy/control-set progress
          content:
            text/event-stream:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/experiments/overlap:
    post:
      tags:
      - experiments
      summary: Compute Overlap
      description: Compute pairwise gene set overlap between experiments.
      operationId: compute_overlap_api_v1_experiments_overlap_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverlapRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverlapResult'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyCookie: []
  /api/v1/experiments/enrichment-compare:
    post:
      tags:
      - experiments
      summary: Compare Enrichment
      description: Compare enrichment results across experiments.
      operationId: compare_enrichment_api_v1_experiments_enrichment_compare_post
      requestBody:
        content:
          application/json:
            schema:
