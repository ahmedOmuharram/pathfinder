components:
  schemas:
    AssistantDeltaEventData:
      properties:
        messageId:
          anyOf:
          - type: string
          - type: 'null'
          title: Messageid
        delta:
          anyOf:
          - type: string
          - type: 'null'
          title: Delta
      type: object
      title: AssistantDeltaEventData
      description: Payload for ``assistant_delta`` SSE events (streaming tokens).
    AssistantMessageEventData:
      properties:
        messageId:
          anyOf:
          - type: string
          - type: 'null'
          title: Messageid
        content:
          anyOf:
          - type: string
          - type: 'null'
          title: Content
      type: object
      title: AssistantMessageEventData
      description: Payload for ``assistant_message`` SSE events (complete message).
    AuthStatusResponse:
      properties:
        signedIn:
          type: boolean
          title: Signedin
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
      type: object
      required:
      - signedIn
      title: AuthStatusResponse
      description: Current auth status response.
    AuthSuccessResponse:
      properties:
        success:
          type: boolean
          title: Success
      type: object
      required:
      - success
      title: AuthSuccessResponse
      description: Success response. Auth token is set via httpOnly cookie only.
    BatchOrganismTargetRequest:
      properties:
        organism:
          type: string
          title: Organism
        positiveControls:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Positivecontrols
        negativeControls:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Negativecontrols
      type: object
      required:
      - organism
      title: BatchOrganismTargetRequest
      description: Per-organism override for a cross-organism batch experiment.
    BenchmarkControlSet:
      properties:
        label:
          type: string
          minLength: 1
          title: Label
        positiveControls:
          items:
            type: string
          type: array
          title: Positivecontrols
        negativeControls:
          items:
            type: string
          type: array
          title: Negativecontrols
        controlSetId:
          anyOf:
          - type: string
          - type: 'null'
          title: Controlsetid
        isPrimary:
          type: boolean
          title: Isprimary
          default: false
      type: object
      required:
      - label
      - positiveControls
      - negativeControls
      title: BenchmarkControlSet
      description: A single control set within a benchmark suite.
    BootstrapResultResponse:
      properties:
        nIterations:
          type: integer
          title: Niterations
          default: 0
        metricCis:
          additionalProperties:
            $ref: '#/components/schemas/ConfidenceIntervalResponse'
          type: object
          title: Metriccis
        rankMetricCis:
          additionalProperties:
            $ref: '#/components/schemas/ConfidenceIntervalResponse'
          type: object
          title: Rankmetriccis
        topKStability:
          type: number
          title: Topkstability
          default: 0.0
        negativeSetSensitivity:
          items:
            $ref: '#/components/schemas/NegativeSetVariantResponse'
          type: array
          title: Negativesetsensitivity
      type: object
      title: BootstrapResultResponse
      description: Robustness assessment via bootstrap resampling.
    BuildGoldRequest:
      properties:
        goldId:
          type: string
          title: Goldid
        siteId:
          type: string
          title: Siteid
        recordType:
          type: string
          title: Recordtype
          default: gene
        stepTree:
          additionalProperties: true
          type: object
          title: Steptree
      type: object
      required:
      - goldId
      - siteId
      - stepTree
      title: BuildGoldRequest
      description: Request to materialize a gold strategy AST on WDK and return gene IDs.
