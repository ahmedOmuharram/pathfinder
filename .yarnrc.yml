compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules

# Keep deps in each workspace's own node_modules to avoid duplicate-package
# issues (e.g. Playwright, React) that arise from root-level hoisting.
nmHoistingLimits: workspaces

# yarn install fails if it would modify yarn.lock — all upgrades must be intentional.
enableImmutableInstalls: true

# Supply-chain protection: block packages younger than 7 days from yarn add.
npmMinimalAgeGate: 10080
