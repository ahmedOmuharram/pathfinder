name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Run ruff
        working-directory: apps/api
        run: uv run ruff check .

      - name: Check formatting
        working-directory: apps/api
        run: uv run ruff format --check .

      - name: Run mypy
        working-directory: apps/api
        run: uv run mypy .

      - name: Check OpenAPI spec is up to date
        working-directory: apps/api
        run: uv run python -m veupath_chatbot.devtools.openapi check

  build-docs:
    name: Build API docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Build Sphinx docs
        working-directory: apps/api
        run: uv run sphinx-build -b html docs docs/_build/html

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pathfinder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pathfinder_test
          API_SECRET_KEY: test-secret-key-xxxxx-xxxxx-xxxxx
        run: uv run pytest --cov=src --cov-report=xml --cov-fail-under=40

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "yarn"
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run ESLint
        working-directory: apps/web
        run: yarn lint

      - name: Check formatting
        working-directory: apps/web
        run: yarn format:check

      - name: Type check
        working-directory: apps/web
        run: yarn typecheck

      - name: Check architectural boundaries
        working-directory: apps/web
        run: yarn check:boundaries

  check-shared-ts:
    name: Check shared TS types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "yarn"
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check OpenAPI-generated types are up to date
        working-directory: packages/shared-ts
        run: yarn check:openapi

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "yarn"
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests (with coverage)
        working-directory: apps/web
        run: yarn test:coverage

  test-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pathfinder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync

      - name: Start API server
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pathfinder_test
          API_SECRET_KEY: test-secret-key-xxxxx-xxxxx-xxxxx
          REDIS_URL: redis://localhost:6379/0
          PATHFINDER_CHAT_PROVIDER: mock
        run: uv run uvicorn veupath_chatbot.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8000/health/ready && exit 0
            sleep 1
          done
          echo "API did not become ready in time" >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "yarn"
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        working-directory: apps/web
        run: yarn playwright install --with-deps

      - name: Build web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: yarn build

      - name: Start web
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          PORT: "3000"
        run: yarn start -p 3000 &

      - name: Wait for web
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:3000/ && exit 0
            sleep 1
          done
          echo "Web did not become ready in time" >&2
          exit 1

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: yarn test:e2e
